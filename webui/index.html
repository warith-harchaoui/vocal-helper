<!doctype html>
<!--
  vocal-helper — minimalistic local web GUI.

  Sovereign by design: this page is fully self-contained (no CDN, no external
  fonts, no analytics) and talks ONLY to a local vocal-helper FastAPI server
  (default http://127.0.0.1:8000). Your audio never leaves the machine.

  Follows the front-ui stack rules (semantic HTML, dark-mode peer, visible
  focus rings, reduced-motion guard, three-Roboto typography with a system
  fallback so it works fully offline). No build step: open it in a browser, or
  let uvicorn serve it. See webui/README.md.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vocal-helper — local transcription &amp; diarization</title>
    <style>
      /*
       * Design tokens (front-ui semantic colors). Two schemes via
       * prefers-color-scheme so the page respects the OS setting with no JS.
       * Roboto is used when present, degrading to the system UI stack offline.
       */
      :root {
        color-scheme: light dark;
        --bg: #f7f7f8;
        --surface: #ffffff;
        --border: #d9d9de;
        --text: #1b1b1f;
        --muted: #5b5b66;
        --accent: #2f6feb;
        --accent-contrast: #ffffff;
        --ok: #1f8a4c;
        --err: #c0392b;
        --radius: 10px;
        --font-sans: "Roboto", system-ui, -apple-system, "Segoe UI", sans-serif;
        --font-mono: "Roboto Mono", ui-monospace, "SF Mono", "Menlo", monospace;
      }
      /* Dark scheme — same tokens, inverted surfaces. */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #17181c;
          --surface: #202128;
          --border: #34353d;
          --text: #ececf1;
          --muted: #a0a0ad;
          --accent: #6b9bff;
          --accent-contrast: #10121a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        line-height: 1.5;
      }
      main {
        max-width: 46rem;
        margin: 0 auto;
        padding: 1.5rem 1rem 4rem;
      }
      header h1 {
        font-size: 1.5rem;
        margin: 0 0 0.25rem;
      }
      /* The sovereignty badge — the page's whole reason for existing. */
      .badge {
        display: inline-block;
        font-size: 0.8rem;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.15rem 0.6rem;
        margin-bottom: 1.25rem;
      }
      fieldset {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 1rem 1.1rem 1.2rem;
        margin: 0 0 1rem;
      }
      legend {
        font-weight: 600;
        padding: 0 0.4rem;
      }
      label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        margin: 0.75rem 0 0.25rem;
      }
      .hint {
        font-weight: 400;
        color: var(--muted);
      }
      input[type="text"],
      input[type="url"],
      select,
      input[type="file"] {
        width: 100%;
        padding: 0.5rem 0.6rem;
        font: inherit;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      /* Segmented control for the mode toggle (Hick's law: 2 clear options). */
      .segmented {
        display: flex;
        gap: 0.25rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.25rem;
        margin-bottom: 0.5rem;
      }
      .segmented label {
        flex: 1;
        margin: 0;
        text-align: center;
      }
      .segmented input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .segmented span {
        display: block;
        padding: 0.4rem;
        border-radius: 6px;
        cursor: pointer;
      }
      .segmented input:checked + span {
        background: var(--accent);
        color: var(--accent-contrast);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .row input[type="checkbox"] {
        width: 1.1rem;
        height: 1.1rem;
      }
      .row label {
        margin: 0;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: var(--accent-contrast);
        background: var(--accent);
        border: 0;
        border-radius: 8px;
        /* 44px min hit area (front-accessibility). */
        min-height: 44px;
        padding: 0 1.25rem;
        cursor: pointer;
        margin-top: 1rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      /* Visible focus ring for keyboard users on every interactive element. */
      :focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      .status {
        min-height: 1.4rem;
        margin: 0.75rem 0;
        font-size: 0.9rem;
      }
      .status[data-kind="error"] {
        color: var(--err);
      }
      .status[data-kind="ok"] {
        color: var(--ok);
      }
      /* Result log panel — Roboto Mono per the three-Roboto rule. */
      pre.result {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        min-height: 6rem;
        margin: 0;
      }
      .spk {
        color: var(--accent);
        font-weight: 600;
      }
      /* Honor users who ask for less motion — no spinner animation for them. */
      .busy::after {
        content: " …";
      }
      @media (prefers-reduced-motion: no-preference) {
        .busy::after {
          animation: dots 1.2s steps(4, end) infinite;
        }
        @keyframes dots {
          0% {
            content: " ";
          }
          25% {
            content: " .";
          }
          50% {
            content: " ..";
          }
          75% {
            content: " ...";
          }
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>vocal-helper</h1>
        <p class="badge">🔒 Runs locally — audio never leaves your machine</p>
      </header>

      <!-- The one form; JS decides /transcribe vs /pipeline from the mode. -->
      <form id="job">
        <fieldset>
          <legend>Audio</legend>

          <label for="api">Local server
            <span class="hint">(the vocal-helper FastAPI you started)</span>
          </label>
          <input type="url" id="api" name="api" value="http://127.0.0.1:8000"
                 inputmode="url" spellcheck="false" />

          <label for="file">Audio file
            <span class="hint">WAV / MP3 / M4A / OGG / FLAC</span>
          </label>
          <input type="file" id="file" name="file"
                 accept="audio/*,.wav,.mp3,.m4a,.ogg,.flac" required />
        </fieldset>

        <fieldset>
          <legend>What to do</legend>

          <!-- Mode: transcribe (text only) vs full pipeline (who spoke when). -->
          <div class="segmented" role="radiogroup" aria-label="Mode">
            <label>
              <input type="radio" name="mode" value="transcribe" checked />
              <span>Transcribe</span>
            </label>
            <label>
              <input type="radio" name="mode" value="pipeline" />
              <span>Full pipeline (diarize)</span>
            </label>
          </div>

          <label for="language">Language
            <span class="hint">'auto' discovers it from the audio — no default</span>
          </label>
          <input type="text" id="language" name="language" value="auto"
                 spellcheck="false" />

          <label for="whisper_model">Whisper model</label>
          <input type="text" id="whisper_model" name="whisper_model"
                 value="large-v3-turbo-q5_0" spellcheck="false" />

          <!-- Pipeline-only controls; JS shows/hides this block. -->
          <div id="pipeline-only" hidden>
            <label for="diar_backend">Diarization backend
              <span class="hint">router default: pyannote (long) · nemo (short) · sherpa (torch-free)</span>
            </label>
            <select id="diar_backend" name="diar_backend">
              <option value="pyannote">pyannote (robust default)</option>
              <option value="nemo">nemo (short ≤4-speaker clips)</option>
              <option value="sherpa">sherpa (torch-free ONNX)</option>
            </select>

            <div class="row" style="margin-top: 0.9rem">
              <input type="checkbox" id="llm" name="llm" />
              <label for="llm">Add a local Gemma rolling summary</label>
            </div>
          </div>

          <button type="submit" id="run" disabled>Run locally</button>
        </fieldset>
      </form>

      <!-- Live region so screen readers announce progress / errors. -->
      <p class="status" id="status" role="status" aria-live="polite"></p>
      <pre class="result" id="result" tabindex="0" aria-label="Result"></pre>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
