name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid stacking redundant runs on rapid pushes / force-pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff

      # ``ruff.toml`` exclusions are defined in pyproject.toml — keep the
      # CI invocation aligned with the local ``ruff check .`` developers run.
      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .
        continue-on-error: true   # Formatter is informational until we adopt it.

  no-more-claude:
    name: No Claude / Anthropic mentions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — the audit walks every commit on every ref.
          fetch-depth: 0

      - name: Run nomoreclaude.sh (audit)
        run: bash nomoreclaude.sh

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          # The ``integration`` marker is filtered out by pyproject.toml's
          # ``addopts`` — we only install the lightweight deps. Heavy
          # extras (pyannote, nemo, ollama, capture-helper) require auth
          # or model downloads and are exercised manually.
          pip install -e '.[dev]'

      - name: pytest
        run: pytest -v --color=yes

      - name: pytest with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest --cov=vocal_helper --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
