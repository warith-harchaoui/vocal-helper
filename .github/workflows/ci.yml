name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          # CI runs the smoke suite only — pyannote / nemo / ollama are
          # tagged ``integration`` and require auth + GPU.
          pip install -e '.[dev]'

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Smoke tests
        run: pytest -q
