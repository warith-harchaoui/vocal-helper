name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid stacking redundant runs on rapid pushes / force-pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff

      # ``ruff.toml`` exclusions are defined in pyproject.toml — keep the
      # CI invocation aligned with the local ``ruff check .`` developers run.
      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .
        continue-on-error: true   # Formatter is informational until we adopt it.

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ffmpeg (audio decode via ffmpeg-python)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          # The ``integration`` marker is filtered out by pyproject.toml's
          # ``addopts`` — we only install the lightweight deps. Heavy
          # extras (pyannote, nemo, ollama, capture-helper) require auth
          # or model downloads and are exercised manually.
          pip install -e '.[dev]'

      - name: pytest
        run: pytest -v --color=yes

      - name: pytest with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          # [tool.coverage.*] in pyproject.toml sets the source, omit
          # list and fail-under threshold. Bump the floor in a
          # standalone PR, never in the same one that adds coverage.
          pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  pre-commit:
    name: pre-commit (mirror of local hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .pre-commit-config.yaml
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit (commit-time hooks only)
        # Push-stage hooks (pytest + attribution audit) are already
        # covered by the ``test`` and ``attribution-audit`` jobs.
        run: pre-commit run --all-files --show-diff-on-failure
